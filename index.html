    </div>

// ===================== SEEDED RANDOM =====================
class SeededRandom {
  constructor(seed) {
    this.seed = seed ? parseInt(seed) : Date.now();
    this.initialSeed = this.seed;
  }
  next() {
    this.seed = (this.seed * 16807 + 0) % 2147483647;
    return (this.seed - 1) / 2147483646;
  }
  pick(arr) {
    return arr[Math.floor(this.next() * arr.length)];
  }
  int(min, max) {
    return Math.floor(this.next() * (max - min + 1)) + min;
  }
  bool() {
    return this.next() > 0.5;
  }
  float(min, max, decimals = 2) {
    const val = this.next() * (max - min) + min;
    return parseFloat(val.toFixed(decimals));
  }
  date(startYear = 2020, endYear = 2026) {
    const start = new Date(startYear, 0, 1).getTime();
    const end = new Date(endYear, 11, 31).getTime();
    const date = new Date(start + this.next() * (end - start));
    return date.toISOString().split('T')[0];
  }
  uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
      const r = this.int(0, 15);
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
}

// ===================== GENERATORS =====================
function generateName(locale, gender, rng) {
  const data = DATA[locale] || DATA.us;
  const g = gender === 'any' ? (rng.bool() ? 'male' : 'female') : gender;
  const first = rng.pick(data.firstNames[g] || data.firstNames.male);
  const last = rng.pick(data.lastNames);
  return { first, last, full: `${first} ${last}` };
}

function generateEmail(firstName, lastName, locale, rng) {
  const data = DATA[locale] || DATA.us;
  const domain = rng.pick(data.domains);
  const formats = [
    `${firstName.toLowerCase()}.${lastName.toLowerCase()}`,
    `${firstName.toLowerCase()[0]}${lastName.toLowerCase()}`,
    `${lastName.toLowerCase()}.${firstName.toLowerCase()}`,
    `${firstName.toLowerCase()}${rng.int(1, 99)}`,
    `${lastName.toLowerCase()}${rng.int(1, 99)}`
  ];
  return `${rng.pick(formats)}@${domain}`;
}

function generatePhone(locale, rng) {
  if (locale === 'us') {
    return `(${rng.int(200, 999)}) ${rng.int(200, 999)}-${rng.int(1000, 9999)}`;
  } else if (locale === 'uk') {
    return `07${rng.int(100, 999)} ${rng.int(100, 999)} ${rng.int(100, 999)}`;
  } else if (locale === 'de') {
    return `+49 ${rng.int(100, 999)} ${rng.int(1000000, 9999999)}`;
  } else if (locale === 'fr') {
    return `0${rng.int(1, 9)} ${rng.int(10, 99)} ${rng.int(10, 99)} ${rng.int(10, 99)} ${rng.int(10, 99)}`;
  } else if (locale === 'jp') {
    return `090-${rng.int(1000, 9999)}-${rng.int(1000, 9999)}`;
  }
  return `+1 (${rng.int(200, 999)}) ${rng.int(200, 999)}-${rng.int(1000, 9999)}`;
}

function generateAddress(locale, rng) {
  const data = DATA[locale] || DATA.us;
  const num = rng.int(1, 9999);
  const street = rng.pick(data.streets);
  const city = rng.pick(data.cities);
  if (locale === 'us') {
    const state = rng.pick(data.stateNames);
    const zip = rng.int(10000, 99999);
    return `${num} ${street}, ${city}, ${state} ${zip}`;
  } else if (locale === 'uk') {
    const postcode = `${rng.pick(['A','B','C','E','G','H','J','L','M','N','O','P','R','S','T','W'])}${rng.int(1, 9)}${rng.pick(['','A','B','C'])} ${rng.int(1, 9)}${rng.pick(['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'])}${rng.pick(['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'])}`;
    return `${num} ${street}, ${city}, ${postcode}`;
  } else if (locale === 'de') {
    const state = rng.pick(data.stateNames);
    const zip = rng.int(10000, 99999);
    return `${street} ${num}, ${zip} ${city}, ${state}`;
  } else if (locale === 'fr') {
    const zip = rng.int(10000, 99999);
    return `${num} ${street}, ${zip} ${city}`;
  } else if (locale === 'jp') {
    const state = rng.pick(data.stateNames);
    return `${state}, ${city}, ${street} ${num}`;
  }
  return `${num} ${street}, ${city}`;
}

function generateCompanyName(locale, rng) {
  const data = DATA[locale] || DATA.us;
  const prefixes = ['Acme','Global','Next','Prime','Core','Summit','Nova','Atlas','Zenith','Pinnacle','Vertex','Apex','Catalyst','Fusion','Synergy'];
  const suffix = rng.pick(data.companySuffixes);
  return `${rng.pick(prefixes)} ${rng.pick(data.lastNames)} ${suffix}`;
}

function generateProductName(locale, rng) {
  const data = DATA[locale] || DATA.us;
  return `${rng.pick(data.productAdjectives)} ${rng.pick(data.productNouns)}`;
}

function generateSKU(rng) {
  const cat = rng.pick(['ELEC','HOME','SPRT','BOOK','FOOD','TOYS','BEAU','AUTO','GARD','OFFC']);
  const num = String(rng.int(1, 999)).padStart(3, '0');
  const suffix = String.fromCharCode(65 + rng.int(0, 25)) + String.fromCharCode(65 + rng.int(0, 25)) + String.fromCharCode(65 + rng.int(0, 25));
  return `${cat}-${num}-${suffix}`;
}

function generateOrderNumber(rng) {
  const year = 2026;
  const num = String(rng.int(1, 9999)).padStart(4, '0');
  return `ORD-${year}-${num}`;
}

function generateParagraph(rng, sentences = 3) {
  const words = ['The','quick','brown','fox','jumps','over','lazy','dog','while','sun','shines','brightly','on','green','meadow','where','flowers','bloom','and','birds','sing','happily','every','morning','brings','new','opportunities','for','growth','learning','discovery','together','we','can','build','better','future','with','technology','innovation','creativity'];
  let text = '';
  for (let s = 0; s < sentences; s++) {
    const len = rng.int(8, 15);
    let sentence = '';
    for (let i = 0; i < len; i++) {
      sentence += rng.pick(words) + ' ';
    }
    text += sentence.trim() + '. ';
  }
  return text.trim();
}

function generateHexColor(rng) {
  return '#' + rng.int(0, 16777215).toString(16).padStart(6, '0');
}

function generateIP(rng) {
  return `${rng.int(1, 255)}.${rng.int(0, 255)}.${rng.int(0, 255)}.${rng.int(0, 255)}`;
}

function generateURL(rng) {
  const domains = ['example.com','test.org','demo.net','sample.io','website.dev'];
  const paths = ['','/about','/products','/contact','/blog','/api/v1','/dashboard'];
  return `https://${rng.pick(domains)}${rng.pick(paths)}`;
}

function buildUser(locale, gender, fields, rng) {
  const nameObj = generateName(locale, gender, rng);
  const row = {};
  if (fields.includes('id')) row.id = rng.uuid();
  if (fields.includes('name')) row.name = nameObj.full;
  if (fields.includes('email')) row.email = generateEmail(nameObj.first, nameObj.last, locale, rng);
  if (fields.includes('phone')) row.phone = generatePhone(locale, rng);
  if (fields.includes('address')) row.address = generateAddress(locale, rng);
  if (fields.includes('age')) row.age = rng.int(18, 80);
  if (fields.includes('jobTitle')) row.jobTitle = rng.pick((DATA[locale] || DATA.us).jobTitles);
  if (fields.includes('company')) row.company = generateCompanyName(locale, rng);
  if (fields.includes('avatar')) row.avatar = `https://i.pravatar.cc/150?u=${rng.uuid()}`;
  return row;
}

function buildCompany(locale, fields, rng) {
  const data = DATA[locale] || DATA.us;
  const name = generateCompanyName(locale, rng);
  const domain = name.toLowerCase().replace(/[^a-z0-9]/g, '').replace(/inc|llc|corp|ltd/g, '') + '.com';
  const row = {};
  if (fields.includes('id')) row.id = rng.uuid();
  if (fields.includes('name')) row.name = name;
  if (fields.includes('catchPhrase')) row.catchPhrase = rng.pick(data.catchPhrases);
  if (fields.includes('bs')) row.bs = rng.pick(data.bsStatements);
  if (fields.includes('industry')) row.industry = rng.pick(data.industries);
  if (fields.includes('address')) row.address = generateAddress(locale, rng);
  if (fields.includes('email')) row.email = `contact@${domain}`;
  if (fields.includes('website')) row.website = `https://${domain}`;
  if (fields.includes('employees')) row.employees = rng.int(10, 10000);
  return row;
}

function buildProduct(locale, fields, rng) {
  const data = DATA[locale] || DATA.us;
  const name = generateProductName(locale, rng);
  const row = {};
  if (fields.includes('id')) row.id = rng.uuid();
  if (fields.includes('name')) row.name = name;
  if (fields.includes('description')) row.description = generateParagraph(rng, 2);
  if (fields.includes('price')) row.price = rng.float(9.99, 999.99);
  if (fields.includes('category')) row.category = rng.pick(data.productCategories);
  if (fields.includes('sku')) row.sku = generateSKU(rng);
  if (fields.includes('inStock')) row.inStock = rng.bool();
  if (fields.includes('rating')) row.rating = rng.float(1, 5, 1);
  if (fields.includes('image')) row.image = `https://via.placeholder.com/300x200?text=${encodeURIComponent(name.replace(/ /g, '+'))}`;
  return row;
}

function buildOrder(locale, fields, rng) {
  const data = DATA[locale] || DATA.us;
  const nameObj = generateName(locale, 'any', rng);
  const row = {};
  if (fields.includes('id')) row.id = rng.uuid();
  if (fields.includes('orderNumber')) row.orderNumber = generateOrderNumber(rng);
  if (fields.includes('customerName')) row.customerName = nameObj.full;
  if (fields.includes('items')) row.items = rng.int(1, 10);
  if (fields.includes('total')) row.total = rng.float(19.99, 2999.99);
  if (fields.includes('status')) row.status = rng.pick(data.orderStatuses);
  if (fields.includes('date')) row.date = rng.date(2024, 2026);
  if (fields.includes('shippingAddress')) row.shippingAddress = generateAddress(locale, rng);
  return row;
}

// ===================== UI RENDERING =====================
function init() {
  renderEntityTabs();

  renderFieldToggles();
  bindEvents();
  updateTableName();
}

function renderEntityTabs() {
  document.querySelectorAll('#entityTabs button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.entity === state.entity);
  });
}

function renderQuickFields() {
  const container = document.getElementById('quickFields');
  const fields = [
    { key: 'name', label: 'Name', generator: () => generateName(state.locale, state.gender, new SeededRandom()).full },
    { key: 'email', label: 'Email', generator: () => { const n = generateName(state.locale, state.gender, new SeededRandom()); return generateEmail(n.first, n.last, state.locale, new SeededRandom()); } },
    { key: 'phone', label: 'Phone', generator: () => generatePhone(state.locale, new SeededRandom()) },
    { key: 'uuid', label: 'UUID', generator: () => new SeededRandom().uuid() },
    { key: 'address', label: 'Address', generator: () => generateAddress(state.locale, new SeededRandom()) },
    { key: 'date', label: 'Date', generator: () => new SeededRandom().date() },
    { key: 'paragraph', label: 'Paragraph', generator: () => generateParagraph(new SeededRandom(), 2) },
    { key: 'url', label: 'URL', generator: () => generateURL(new SeededRandom()) },
    { key: 'hex', label: 'Hex Color', generator: () => generateHexColor(new SeededRandom()) },
    { key: 'ip', label: 'IP Address', generator: () => generateIP(new SeededRandom()) },
    { key: 'company', label: 'Company', generator: () => generateCompanyName(state.locale, new SeededRandom()) },
    { key: 'product', label: 'Product', generator: () => generateProductName(state.locale, new SeededRandom()) }

    state.quickValues[f.key] = val;

function renderFieldToggles() {
  const container = document.getElementById('fieldToggles');
  const config = ENTITY_CONFIG[state.entity];
  container.innerHTML = config.fields.map(f => {
    const checked = state.fields[state.entity].includes(f) ? 'checked' : '';
    return `<label class="checkbox-wrapper">
      <input type="checkbox" value="${f}" ${checked} onchange="toggleField('${f}')">
      <span>${config.labels[f]}</span>
    </label>`;
  }).join('');
}

function bindEvents() {
  document.querySelectorAll('#entityTabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.entity = btn.dataset.entity;
      renderEntityTabs();
      renderFieldToggles();
      renderQuickFields();
      updateTableName();
      document.getElementById('genderRow').style.display = state.entity === 'user' ? 'block' : 'none';
    });
  });

  document.querySelectorAll('[data-gender]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.gender = btn.dataset.gender;
      document.querySelectorAll('[data-gender]').forEach(b => b.classList.toggle('active', b === btn));
      renderQuickFields();
    });
  });

  const countSlider = document.getElementById('countSlider');
  const countInput = document.getElementById('countInput');
  countSlider.addEventListener('input', () => {
    state.count = parseInt(countSlider.value);
    countInput.value = state.count;
  });
  countInput.addEventListener('change', () => {
    let v = parseInt(countInput.value) || 1;
    v = Math.max(1, Math.min(1000, v));
    state.count = v;
    countSlider.value = v;
    countInput.value = v;
  });

  document.getElementById('formatSelect').addEventListener('change', (e) => {
    state.format = e.target.value;
    document.getElementById('tableName').style.display = state.format === 'sql' ? 'inline-block' : 'none';
    if (state.generatedData.length) generateOutput();
  });

  });

  });

  document.getElementById('generateBtn').addEventListener('click', generateBulk);
  document.getElementById('copyAllBtn').addEventListener('click', copyAll);
  document.getElementById('downloadBtn').addEventListener('click', downloadFile);
}

function toggleField(field) {
  const arr = state.fields[state.entity];
  if (arr.includes(field)) {
    state.fields[state.entity] = arr.filter(f => f !== field);
  } else {
    state.fields[state.entity] = [...arr, field];
  }
}

function updateTableName() {
  const names = { user: 'users', company: 'companies', product: 'products', order: 'orders' };
  document.getElementById('tableName').value = names[state.entity];
}

// ===================== GENERATION =====================
function generateBulk() {
  const rng = new SeededRandom(state.seed);
  const data = [];
  const fields = state.fields[state.entity];

  for (let i = 0; i < state.count; i++) {
    let row;
    switch (state.entity) {
      case 'user': row = buildUser(state.locale, state.gender, fields, rng); break;
      case 'company': row = buildCompany(state.locale, fields, rng); break;
      case 'product': row = buildProduct(state.locale, fields, rng); break;
      case 'order': row = buildOrder(state.locale, fields, rng); break;
    }
    data.push(row);
  }

  state.generatedData = data;
  renderPreview(data, fields);
  generateOutput();

  document.getElementById('previewCard').style.display = 'block';
  document.getElementById('outputCard').style.display = 'block';
}

function renderPreview(data, fields) {
  const maxPreview = Math.min(5, data.length);
  document.getElementById('previewCount').textContent = `Showing ${maxPreview} of ${data.length} rows`;

  const head = document.getElementById('previewHead');
  const body = document.getElementById('previewBody');

  head.innerHTML = '<tr>' + fields.map(f => `<th>${ENTITY_CONFIG[state.entity].labels[f]}</th>`).join('') + '</tr>';

  body.innerHTML = data.slice(0, maxPreview).map((row, i) => {
    return '<tr class="fade-in stagger-' + (i + 1) + '">' + fields.map(f => {
      let val = row[f];
      if (typeof val === 'boolean') val = val ? 'Yes' : 'No';
      if (val === undefined || val === null) val = '-';
      val = String(val);
      if (val.length > 40) val = val.substring(0, 40) + '...';
      return `<td>${val}</td>`;
    }).join('') + '</tr>';
  }).join('');
}

function generateOutput() {
  const data = state.generatedData;
  const fields = state.fields[state.entity];
  let output = '';

  switch (state.format) {
    case 'json':
      output = JSON.stringify(data, null, 2);
      break;
    case 'json-min':
      output = JSON.stringify(data);
      break;
    case 'csv':
      output = toCSV(data, fields);
      break;
    case 'sql':
      const tableName = document.getElementById('tableName').value || 'users';
      output = toSQL(data, fields, tableName);
      break;
  }

  document.getElementById('outputArea').value = output;
}

function toCSV(rows, fields) {
  const headers = fields.map(f => ENTITY_CONFIG[state.entity].labels[f]).join(',');
  const lines = rows.map(row => {
    return fields.map(f => {
      let val = row[f];
      if (val === undefined || val === null) val = '';
      val = String(val).replace(/"/g, '""');
      if (val.includes(',') || val.includes('"') || val.includes('\n')) {
        val = `"${val}"`;
      }
      return val;
    }).join(',');
  });
  return [headers, ...lines].join('\n');
}

function toSQL(rows, fields, tableName) {
  const cols = fields.map(f => f).join(', ');
  return rows.map(row => {
    const vals = fields.map(f => {
      let val = row[f];
      if (val === undefined || val === null) return 'NULL';
      if (typeof val === 'string') return `'${val.replace(/'/g, "''")}'`;
      if (typeof val === 'boolean') return val ? 'TRUE' : 'FALSE';
      return val;
    }).join(', ');
    return `INSERT INTO ${tableName} (${cols}) VALUES (${vals});`;
  }).join('\n');
}

// ===================== CLIPBOARD & DOWNLOAD =====================
function copyQuickField(key) {
  const val = state.quickValues[key];
  if (val) {
    copyToClipboard(val);
    showToast(`Copied: ${String(val).substring(0, 30)}${String(val).length > 30 ? '...' : ''}`);
    // Regenerate this field
    renderQuickFields();
  }
}

function copyAll() {
  const output = document.getElementById('outputArea').value;
  if (!output) return;
  copyToClipboard(output);
  showToast('All data copied to clipboard');
}

function copyOutput() {
  copyAll();
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function downloadFile() {
  const output = document.getElementById('outputArea').value;
  if (!output) return;

  const extensions = { 'json': 'json', 'json-min': 'json', 'csv': 'csv', 'sql': 'sql' };
  const ext = extensions[state.format];
  const blob = new Blob([output], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fake-data-${state.entity}s.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Downloaded as .${ext}`);
}

// ===================== INIT =====================
init();
</script>
